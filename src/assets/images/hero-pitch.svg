<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cancha de fútbol y datos mundialistas</title>
  <desc id="desc">Ilustración panorámica de una cancha de fútbol con líneas de análisis y luces de estadio.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#11231c"/>
      <stop offset="0.55" stop-color="#174530"/>
      <stop offset="1" stop-color="#f8faf7"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f7a3b"/>
